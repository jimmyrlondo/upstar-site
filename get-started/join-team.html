<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Join Our Team | Upstar Mental Health Services</title>
  <link rel="stylesheet" href="../assets/css/styles.css">
  <script src="../assets/js/main.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to content</a>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="../index.html">Upstar Mental Health Services</a>
      <button class="nav-toggle" aria-expanded="false" aria-controls="primary-nav">Menu</button>
      <nav class="site-nav" id="primary-nav" aria-label="Main navigation">
        <ul>
          <li><a class="nav-link" href="../index.html">Home</a></li>
          <li><a class="nav-link" href="../services.html">Services</a></li>
          <li><a class="nav-link" href="../about.html">About</a></li>
          <li><a class="nav-link" href="../get-started/index.html">Get Started</a></li>
          <li><a class="nav-link" href="../contact.html">Contact</a></li>
          <li><a class="nav-link" href="../policies/index.html">Policies</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main id="main-content" class="section">
    <div class="container form-wrap">
      <h1>Join Our Team</h1>
      <p>Share your interest and background. We’ll respond within 1 business day.</p>
      <!-- Replace REPLACE_ME with your Formspree form ID in this single endpoint used across all site forms. -->
      <form method="post" action="https://formspree.io/f/REPLACE_ME">
        <input type="hidden" name="_subject" value="Join Our Team Interest">
        <input type="hidden" name="_next" value="success.html">
        <label for="jt-name">Full name</label>
        <input id="jt-name" name="name" required>
        <label for="jt-email">Email</label>
        <input id="jt-email" name="email" type="email" required>
        <label for="jt-phone">Phone</label>
        <input id="jt-phone" name="phone" type="tel">
        <label for="jt-role">Role of interest</label>
        <input id="jt-role" name="role_interest">
        <label for="jt-experience">Experience summary</label>
        <textarea id="jt-experience" name="experience" required></textarea>
        <button class="btn" type="submit">Submit Interest Form</button>
      </form>
      <p><a href="index.html">Back to Get Started</a></p>
    </div>
  </main>

  <footer class="site-footer">
    <div class="container small">
      <p>&copy; 2026 Upstar Mental Health Services. All rights reserved.</p>
    </div>
  </footer>
</body>
</html>
